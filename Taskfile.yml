version: '3'

tasks:
  default:
    desc: 'Default task runs the "test" and "build" tasks'
    deps:
      - test
      - build

  list:
    desc: 'Lists available tasks'
    cmds:
      - task --list-all

  go-tidy:
    desc: 'Go tidy all the things'
    run: once
    cmds:
      - go mod tidy

  go-update:
    desc: 'Go update all the dependencies'
    run: once
    cmds:
      - go get -u ./...

  test:
    desc: 'Run all Go tests'
    cmds:
      - go test ./...

  build:
    desc: 'Build all the things'
    deps:
      - build-examples

  clean:
    desc: 'Clean built examples'
    cmds:
      - rm -rf bin/
      - rm -rf .task

  build-examples:
    desc: 'Build all examples'
    deps:
      - build-ex-swatch
      - build-ex-simple

  build-ex-swatch:
    desc: 'Build the swatch example'
    deps:
      - go-tidy
    cmds:
      - mkdir -p bin
      - go build -o bin/swatch ./examples/swatch
    sources:
      - "*.go"
      - examples/swatch/*.go
      - go.mod
    generates:
      - bin/swatch

  build-ex-simple:
    desc: 'Build the simple example'
    deps:
      - go-tidy
    cmds:
      - mkdir -p bin
      - go build -o bin/simple ./examples/simple
    sources:
      - "*.go"
      - examples/simple/*.go
      - go.mod
    generates:
      - bin/simple

  vhs-validate:
    desc: 'Validate vhs tape file'
    cmds:
      - vhs validate ./examples/swatch/demo.tape

  vhs:
    desc: 'Generate gif via vhs'
    deps:
      - build-ex-swatch
    cmds:
      - vhs --output ./examples/swatch/demo.gif ./examples/swatch/demo.tape

  build-wasm-site:
    desc: 'Build the WASM demo site into web/'
    deps: [go-tidy]
    cmds:
      - GOARCH=wasm GOOS=js go build -o web/app.wasm ./examples/swatch/
      - go tool booba-assets web/
    generates:
      - web/app.wasm

  serve-wasm-site:
    desc: 'Serve web/ at http://localhost:8000/ntemoji/ (matches GH Pages prefix)'
    deps: [build-wasm-site]
    vars:
      SERVE_DIR: /tmp/ntemoji-site
    cmds:
      - mkdir -p {{.SERVE_DIR}}
      - rm -f {{.SERVE_DIR}}/ntemoji
      - ln -sfn "$(pwd)/web" {{.SERVE_DIR}}/ntemoji
      - echo 'Serving at http://localhost:8000/ntemoji/'
      - cd {{.SERVE_DIR}} && python3 -m http.server 8000

  clean-wasm-site:
    desc: 'Remove WASM demo site artifacts'
    cmds:
      - rm -rf web/booba web/ghostty-web web/_assets
      - rm -f web/wasm_exec.js web/app.wasm
